name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install -r requirements-dev.txt

      - name: Run unit tests with coverage
        run: |
          python -m pytest -q --cov -m "not integration"

  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install quality tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install -r requirements-dev.txt

      - name: Ruff lint
        run: |
          ruff check .

      - name: Mypy type check
        run: |
          mypy migration migration_v2 scripts

  security:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install security tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install -r requirements-dev.txt
          python -m pip install pip-audit

      - name: Bandit security scan
        run: |
          bandit -q -r migration migration_v2 scripts -x tests,tests_v2

      - name: Dependency vulnerability audit
        run: |
          python -m pip_audit -r requirements.txt

  terraform:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.5

      - name: Terraform fmt check
        run: |
          terraform fmt -check -recursive infra/terraform

      - name: Terraform validate stacks and env wrappers
        shell: bash
        run: |
          set -euo pipefail
          dirs=(
            "infra/terraform/stacks/v1_sql_api"
            "infra/terraform/stacks/v2_multiapi_router"
            "infra/terraform/envs/dev"
            "infra/terraform/envs/stage"
            "infra/terraform/envs/prod"
          )
          for d in "${dirs[@]}"; do
            echo "Validating $d"
            terraform -chdir="$d" init -backend=false -input=false
            terraform -chdir="$d" validate
          done
